<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>在线元数据（歌词+封面）</title>
<style>
/* 插件样式 — CSS 变量、reset、body 和字体由主程序 common.css 提供 */
.wrap{max-width:560px;margin:0 auto;padding:24px 20px}
h1{font-size:18px;font-weight:600;margin-bottom:4px}
.sub{font-size:12px;color:var(--md-on-surface-variant);margin-bottom:24px}
.card{background:var(--md-surface-2);border-radius:12px;padding:16px 20px;margin-bottom:16px}
.card h2{font-size:13px;font-weight:600;margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--md-on-surface-variant)}
.switch-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0}
.switch-row-label{display:flex;flex-direction:column;gap:2px}
.switch-row-title{font-size:14px;font-weight:500;color:var(--md-on-surface)}
.switch-row-subtitle{font-size:12px;color:var(--md-on-surface-variant)}
.row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.row:last-child{margin-bottom:0}
.row label{font-size:13px;flex:1}
select,input[type=text]{padding:7px 10px;border:1px solid var(--md-outline-variant);border-radius:6px;background:transparent;color:var(--md-on-surface);font-size:13px;outline:none;width:100%;box-sizing:border-box}
select:focus,input[type=text]:focus{border-color:var(--md-primary)}
select{width:auto;min-width:120px;cursor:pointer}
.url-row{margin-top:8px}
.btn:disabled{opacity:.4;cursor:default;pointer-events:none}
.status{margin-top:12px;font-size:12px;padding:8px 12px;border-radius:6px;display:none}
.status.ok{display:block;background:rgba(76,175,80,.1);color:var(--md-success)}
.status.err{display:block;background:rgba(229,115,115,.1);color:var(--md-error)}
.status.info{display:block;background:rgba(124,154,224,.1);color:var(--md-primary)}
.test-row{display:flex;gap:8px;margin-bottom:8px}
.test-row input{flex:1}
.preview{margin-top:8px;font-size:11px;color:var(--md-on-surface-variant);white-space:pre-wrap;max-height:120px;overflow-y:auto;font-family:'Fira Code','JetBrains Mono',monospace;background:var(--md-surface-2);padding:8px;border-radius:4px;display:none;border:1px solid var(--md-outline-variant)}

/* 音源优先级列表 */
.source-list{list-style:none;padding:0;margin:0}
.source-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;margin-bottom:4px;background:var(--md-surface);transition:background .15s}
.source-item:hover{background:var(--md-surface-3)}
.source-item.disabled-source{opacity:.45}
.source-drag{cursor:grab;color:var(--md-on-surface-variant);font-size:16px;user-select:none;min-width:20px;text-align:center;flex-shrink:0}
.source-drag:active{cursor:grabbing}
.source-info{flex:1;display:flex;flex-direction:column;gap:1px}
.source-name{font-size:13px;font-weight:500;color:var(--md-on-surface)}
.source-id{font-size:11px;color:var(--md-on-surface-variant)}
.source-switch{flex-shrink:0}

/* 分隔线 */
.divider{height:1px;background:var(--md-outline-variant);margin:16px 0;opacity:.3}

/* 操作按钮行 */
.action-row{display:flex;gap:8px;margin-top:16px}

/* LRClib 配置区 */
.lrclib-section{margin-top:12px}
</style>
</head>
<body>
<div class="wrap">
  <h1>在线元数据（歌词+封面）</h1>
  <p class="sub">聚合多个平台自动获取歌词和封面，播放歌曲时自动匹配</p>

  <!-- 基本开关 -->
  <div class="card">
    <h2>基本设置</h2>
    <div class="switch-row" style="margin-bottom:12px">
      <div class="switch-row-label">
        <span class="switch-row-title">启用插件</span>
        <span class="switch-row-subtitle">开启后自动搜索歌词和封面</span>
      </div>
      <label class="switch">
        <input type="checkbox" id="enabled" aria-label="启用插件">
        <span class="switch-track"></span>
        <span class="switch-thumb"></span>
      </label>
    </div>
    <div class="switch-row" style="margin-bottom:12px">
      <div class="switch-row-label">
        <span class="switch-row-title">播放时自动获取</span>
        <span class="switch-row-subtitle">播放歌曲时自动搜索歌词和封面</span>
      </div>
      <label class="switch">
        <input type="checkbox" id="autoFetchOnPlay" aria-label="播放时自动获取">
        <span class="switch-track"></span>
        <span class="switch-thumb"></span>
      </label>
    </div>
    <div class="switch-row">
      <div class="switch-row-label">
        <span class="switch-row-title">自动更新封面</span>
        <span class="switch-row-subtitle">获取到封面时自动写入歌曲</span>
      </div>
      <label class="switch">
        <input type="checkbox" id="autoUpdateCover" aria-label="自动更新封面">
        <span class="switch-track"></span>
        <span class="switch-thumb"></span>
      </label>
    </div>
  </div>

  <!-- 音源管理 -->
  <div class="card">
    <h2>音源管理</h2>
    <p style="font-size:12px;color:var(--md-on-surface-variant);margin-bottom:12px">
      拖拽调整搜索优先级（排在前面的优先尝试），开关控制是否启用
    </p>
    <ul class="source-list" id="sourceList"></ul>

    <div class="divider"></div>

    <!-- LRClib 配置 -->
    <div class="lrclib-section">
      <div class="row">
        <label for="lrclibProvider">LRClib 提供商</label>
        <select id="lrclibProvider" aria-label="LRClib 提供商">
          <option value="lrclib">lrclib.net（默认）</option>
          <option value="custom">自定义 API</option>
        </select>
      </div>
      <div class="url-row" id="lrclibUrlRow" style="display:none">
        <input type="text" id="lrclibCustomUrl" placeholder="https://your-lrcapi.example.com" aria-label="自定义 LRClib API 地址">
      </div>
    </div>
  </div>

  <!-- 保存 -->
  <div class="action-row">
    <button class="btn btn-filled" id="saveBtn" onclick="save()">保存配置</button>
    <button class="btn btn-outlined" id="resetBtn" onclick="resetConfig()">恢复默认</button>
  </div>
  <div class="status" id="saveStatus" aria-live="polite"></div>

  <!-- 测试搜索 -->
  <div class="card" style="margin-top:16px">
    <h2>测试搜索</h2>
    <div class="test-row">
      <input type="text" id="testTitle" placeholder="歌曲名" value="Bohemian Rhapsody" aria-label="测试歌曲名">
      <input type="text" id="testArtist" placeholder="歌手" value="Queen" aria-label="测试歌手">
      <button class="btn btn-outlined" id="testBtn" onclick="testSearch()">测试</button>
    </div>
    <div class="status" id="testStatus" aria-live="polite"></div>
    <div class="preview" id="preview"></div>
    <div id="diagTable" style="margin-top:12px;font-size:12px;display:none">
      <table style="width:100%;border-collapse:collapse">
        <thead>
          <tr style="border-bottom:1px solid var(--md-outline-variant)">
            <th style="text-align:left;padding:4px 8px">音源</th>
            <th style="text-align:center;padding:4px 8px">状态</th>
            <th style="text-align:left;padding:4px 8px">匹配</th>
            <th style="text-align:center;padding:4px 8px">歌词</th>
            <th style="text-align:left;padding:4px 8px">错误</th>
          </tr>
        </thead>
        <tbody id="diagBody"></tbody>
      </table>
    </div>
  </div>
</div>
<script>
const $ = s => document.getElementById(s);
const { apiGet, apiPost, apiPut } = window.SongloftPlugin || {};

async function api(method, path, body) {
  if (method === 'GET') return await apiGet(path);
  if (method === 'PUT') return await apiPut(path, body);
  return await apiPost(path, body);
}

/* 音源定义 */
const SOURCE_META = {
  wy:  { name: '网易云音乐', id: 'wy',  status: null },
  kg:  { name: '酷狗音乐',   id: 'kg',  status: null },
  tx:  { name: 'QQ音乐',     id: 'tx',  status: null },
  kw:  { name: '酷我音乐',   id: 'kw',  status: null },
  mg:  { name: '咪咕音乐',   id: 'mg',  status: null },
  lrclib: { name: 'LRClib',  id: 'lrclib', status: null },
};

let currentConfig = null;

/* 加载配置 */
async function load() {
  try {
    currentConfig = await api('GET', '/config');
    renderSourceList();
    $('enabled').checked = currentConfig.enabled || false;
    $('autoFetchOnPlay').checked = currentConfig.autoFetchOnPlay !== false;
    $('autoUpdateCover').checked = currentConfig.autoUpdateCover !== false;
    $('lrclibProvider').value = currentConfig.lrclib?.provider || 'lrclib';
    $('lrclibCustomUrl').value = currentConfig.lrclib?.customUrl || '';
    toggleLrcUrl();
    updateDependent();
  } catch (e) {
    showStatus('saveStatus', 'err', '加载配置失败: ' + e.message);
  }
}

/* 渲染音源优先级列表 */
function renderSourceList() {
  const list = $('sourceList');
  list.innerHTML = '';
  const priority = currentConfig.sourcePriority || ['wy','kg','tx','kw','mg','lrclib'];
  const enabled = currentConfig.sources || {};

  priority.forEach((sid) => {
    const meta = SOURCE_META[sid];
    if (!meta) return;
    const isOn = enabled[sid] !== false;
    const li = document.createElement('li');
    li.className = 'source-item' + (isOn ? '' : ' disabled-source');
    li.dataset.source = sid;
    li.draggable = true;
    li.innerHTML = `
      <span class="source-drag" title="拖拽排序">\u2E3F</span>
      <div class="source-info">
        <span class="source-name">${meta.name}</span>
        <span class="source-id">${meta.id}</span>
      </div>
      <label class="switch source-switch">
        <input type="checkbox" ${isOn ? 'checked' : ''} aria-label="\u542F\u7528${meta.name}" onchange="toggleSource('${sid}', this.checked)">
        <span class="switch-track"></span>
        <span class="switch-thumb"></span>
      </label>
    `;
    list.appendChild(li);
  });

  /* 简易拖拽排序 */
  setupDragSort(list);
}

/* 拖拽排序 */
function setupDragSort(list) {
  let dragEl = null;
  list.addEventListener('dragstart', (e) => {
    const item = e.target.closest('.source-item');
    if (!item) return;
    dragEl = item;
    item.style.opacity = '0.4';
    e.dataTransfer.effectAllowed = 'move';
  });
  list.addEventListener('dragend', (e) => {
    if (dragEl) { dragEl.style.opacity = ''; dragEl = null; }
  });
  list.addEventListener('dragover', (e) => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    const afterEl = getDragAfterElement(list, e.clientY);
    const item = e.target.closest('.source-item');
    if (dragEl && item !== dragEl) {
      if (afterEl == null) list.appendChild(dragEl);
      else list.insertBefore(dragEl, afterEl);
    }
  });
}

function getDragAfterElement(list, y) {
  const items = [...list.querySelectorAll('.source-item:not([style*="opacity: 0.4"])')];
  return items.reduce((closest, child) => {
    const box = child.getBoundingClientRect();
    const offset = y - box.top - box.height / 2;
    if (offset < 0 && offset > closest.offset) {
      return { offset, element: child };
    }
    return closest;
  }, { offset: Number.NEGATIVE_INFINITY }).element;
}

function toggleSource(sid, checked) {
  if (!currentConfig) return;
  if (!currentConfig.sources) currentConfig.sources = {};
  currentConfig.sources[sid] = checked;
  const li = document.querySelector(`.source-item[data-source="${sid}"]`);
  if (li) li.classList.toggle('disabled-source', !checked);
}

function toggleLrcUrl() {
  $('lrclibUrlRow').style.display = $('lrclibProvider').value === 'custom' ? 'block' : 'none';
}
$('lrclibProvider').addEventListener('change', toggleLrcUrl);

function updateDependent() {
  const enabled = $('enabled').checked;
  document.querySelectorAll('.switch-row:not(:first-child) .switch input, .source-switch input').forEach(el => {
    el.disabled = !enabled;
  });
  document.querySelectorAll('.switch-row:not(:first-child), .source-list, .lrclib-section, .test-row').forEach(el => {
    el.style.opacity = enabled ? '' : '.45';
    el.style.pointerEvents = enabled ? '' : 'none';
  });
}
$('enabled').addEventListener('change', updateDependent);

/* 收集当前 UI 状态为配置对象 */
function collectConfig() {
  const sources = {};
  document.querySelectorAll('.source-item').forEach(li => {
    const sid = li.dataset.source;
    sources[sid] = li.querySelector('.source-switch input').checked;
  });

  const priority = [];
  document.querySelectorAll('.source-item').forEach(li => {
    priority.push(li.dataset.source);
  });

  return {
    enabled: $('enabled').checked,
    autoFetchOnPlay: $('autoFetchOnPlay').checked,
    autoUpdateCover: $('autoUpdateCover').checked,
    sources,
    sourcePriority: priority,
    lrclib: {
      provider: $('lrclibProvider').value,
      customUrl: $('lrclibProvider').value === 'custom' ? $('lrclibCustomUrl').value.trim() : '',
    },
  };
}

/* 保存 */
async function save() {
  const btn = $('saveBtn');
  btn.disabled = true;
  showStatus('saveStatus', 'info', '保存中...');
  try {
    const cfg = collectConfig();
    const res = await api('PUT', '/config', cfg);
    if (res.error) {
      showStatus('saveStatus', 'err', res.error);
    } else {
      currentConfig = res.config || cfg;
      showStatus('saveStatus', 'ok', '保存成功');
    }
  } catch (e) {
    showStatus('saveStatus', 'err', '保存失败: ' + e.message);
  }
  btn.disabled = false;
  setTimeout(() => { const s = $('saveStatus'); if (s.classList.contains('ok')) s.className = 'status'; }, 3000);
}

/* 恢复默认 */
async function resetConfig() {
  const btn = $('resetBtn');
  btn.disabled = true;
  try {
    const res = await api('POST', '/config/reset');
    currentConfig = res.config;
    renderSourceList();
    $('enabled').checked = currentConfig.enabled || false;
    $('autoFetchOnPlay').checked = currentConfig.autoFetchOnPlay !== false;
    $('autoUpdateCover').checked = currentConfig.autoUpdateCover !== false;
    $('lrclibProvider').value = currentConfig.lrclib?.provider || 'lrclib';
    $('lrclibCustomUrl').value = currentConfig.lrclib?.customUrl || '';
    toggleLrcUrl();
    updateDependent();
    showStatus('saveStatus', 'ok', '已恢复默认配置');
  } catch (e) {
    showStatus('saveStatus', 'err', '恢复失败: ' + e.message);
  }
  btn.disabled = false;
}

/* 测试搜索 */
async function testSearch() {
  const btn = $('testBtn');
  btn.disabled = true;
  showStatus('testStatus', 'info', '搜索中...');
  $('preview').style.display = 'none';
  $('diagTable').style.display = 'none';
  $('diagBody').innerHTML = '';
  try {
    const t = encodeURIComponent($('testTitle').value);
    const a = encodeURIComponent($('testArtist').value);
    const res = await api('GET', `/test-search?title=${t}&artist=${a}`);

    // 显示诊断表格
    if (res.diagnostics && res.diagnostics.length > 0) {
      const tbody = $('diagBody');
      tbody.innerHTML = '';
      for (const d of res.diagnostics) {
        const tr = document.createElement('tr');
        tr.style.borderBottom = '1px solid rgba(128,128,128,0.15)';
        const statusText = d.enabled ? (d.searchCount > 0 ? 'OK' : '无结果') : '已关闭';
        const statusColor = d.enabled ? (d.searchCount > 0 ? 'var(--md-success)' : 'var(--md-on-surface-variant)') : 'var(--md-on-surface-variant)';
        const matchText = d.searchCount > 0 ? `${d.matchName || '(?)'} / ${d.matchArtist || '(?)'}` : '-';
        const lyricText = d.lyricFound ? '有' : (d.searchCount > 0 ? '无' : '-');
        const lyricColor = d.lyricFound ? 'var(--md-success)' : 'var(--md-error)';
        tr.innerHTML = `
          <td style="padding:4px 8px">${d.name}</td>
          <td style="padding:4px 8px;text-align:center;color:${statusColor}">${statusText}</td>
          <td style="padding:4px 8px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${matchText}">${matchText}</td>
          <td style="padding:4px 8px;text-align:center;color:${lyricColor}">${lyricText}</td>
          <td style="padding:4px 8px;color:var(--md-error);font-size:11px">${d.error || ''}</td>
        `;
        tbody.appendChild(tr);
      }
      $('diagTable').style.display = 'block';
    }

    if (res.success) {
      showStatus('testStatus', 'ok', '搜索成功 — 来源: ' + (res.source || '未知'));
      $('preview').textContent = res.preview || '(无预览)';
      $('preview').style.display = 'block';
    } else {
      showStatus('testStatus', 'err', '未找到歌词（见下方诊断表）');
    }
  } catch (e) {
    showStatus('testStatus', 'err', '搜索失败: ' + e.message);
  }
  btn.disabled = false;
}

function showStatus(id, cls, msg) {
  const el = $(id);
  el.className = 'status ' + cls;
  el.textContent = msg;
}

/* 启动 */
load();
</script>
</body>
</html>
